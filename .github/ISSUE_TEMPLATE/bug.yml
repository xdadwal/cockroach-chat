name: 🐛 Bug report
description: Something behaves incorrectly
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **If this is a security vulnerability, do not file it here.** Use
        [private reporting](https://github.com/xdadwal/cockroach-chat/security/advisories/new)
        instead — see [SECURITY.md](https://github.com/xdadwal/cockroach-chat/blob/master/SECURITY.md).

  - type: dropdown
    id: area
    attributes:
      label: Where is it?
      options:
        - Rust core (meshcore)
        - Simulator (sim)
        - Android app — BLE / mesh
        - Android app — UI
        - Build / tooling
        - Not sure
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: What happened, and what did you expect instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A failing test or a `cargo run -p sim` invocation is the gold standard.
      placeholder: |
        1. cargo run -p sim -- --nodes 200 --scenario broadcast
        2. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS and toolchain for core bugs; device and Android version for app bugs.
      placeholder: "macOS 15.5, rustc 1.79.0 / Galaxy S23, Android 14"

  - type: textarea
    id: logs
    attributes:
      label: Output or logs
      description: Scrub identifying information before pasting.
      render: shell
