name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: rust (fmt, clippy, test, sim)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --workspace

      - name: Golden vectors are current
        # Fails if the committed testvectors drifted from freshly-generated bytes.
        run: cargo test -p meshcore --test vectors

      - name: Simulator smoke (200-node broadcast)
        run: cargo run -p sim -- --nodes 200 --scenario broadcast

  msrv:
    name: msrv (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Keeps Cargo.toml's declared rust-version honest. Must match it exactly.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"

      - uses: Swatinem/rust-cache@v2

      - name: Check workspace builds on the declared MSRV
        run: cargo check --workspace --all-targets

  audit:
    name: audit (advisories, licenses, bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources

  android:
    name: android (build + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: dtolnay/rust-toolchain@stable
        with:
          # Emulator ABI only — building all three would triple CI time for no extra signal on a PR.
          targets: x86_64-linux-android

      - uses: Swatinem/rust-cache@v2

      - uses: gradle/actions/setup-gradle@v4

      - name: Cross-compile core + generate Kotlin bindings
        # The script auto-detects the NDK from ANDROID_HOME on the runner.
        run: ABIS=x86_64 ./scripts/build-android-lib.sh

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Android lint
        working-directory: android
        run: ./gradlew lintDebug --no-daemon

      - name: Unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload lint report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
