name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: rust (fmt, clippy, test, sim)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --workspace

      - name: Golden vectors are current
        # Fails if the committed testvectors drifted from freshly-generated bytes.
        run: cargo test -p meshcore --test vectors

      - name: Simulator smoke (200-node broadcast)
        run: cargo run -p sim -- --nodes 200 --scenario broadcast
