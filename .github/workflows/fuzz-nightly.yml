name: Fuzz (nightly)

# The PR job runs 60s per target — enough to catch regressions, not enough to find anything new.
# This is where real coverage accumulates.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      minutes:
        description: Minutes per target
        default: "20"

permissions:
  contents: read
  issues: write

jobs:
  fuzz:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [wire_decode, frag_reassemble, decompress]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/meshcore/fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz ${{ matrix.target }}
        working-directory: crates/meshcore/fuzz
        run: |
          MINUTES="${{ github.event.inputs.minutes || '20' }}"
          cargo fuzz run "${{ matrix.target }}" -- \
            -max_total_time=$(( MINUTES * 60 )) -print_final_stats=1

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: crates/meshcore/fuzz/artifacts/
          if-no-files-found: ignore

      - name: Open an issue on crash
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const target = '${{ matrix.target }}';
            const title = `Fuzz crash in ${target}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'security',
            });
            if (existing.data.some(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title,
              labels: ['bug', 'security'],
              body: [
                `The nightly fuzz job crashed \`${target}\`.`,
                '',
                `**Do not paste the reproducer into a public comment** if it looks like it could`,
                `be a remotely triggerable memory-safety or DoS bug — follow [SECURITY.md](../blob/master/SECURITY.md)`,
                `and move the discussion to a private advisory.`,
                '',
                `Crash input is attached to [the failing run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
                '',
                'Reproduce locally:',
                '```bash',
                'cd crates/meshcore/fuzz',
                `cargo fuzz run ${target} artifacts/${target}/<crash-file>`,
                '```',
              ].join('\n'),
            });
